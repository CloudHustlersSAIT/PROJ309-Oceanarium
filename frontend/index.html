<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oceanarium</title>
    <!--
      Anti-FOUC: runs synchronously before first paint.
      Reads stored theme and adds/removes `dark` class on <html> immediately,
      preventing a flash of the wrong color scheme on page load.
    -->
    <script>
      (function () {
        try {
          var s = localStorage.getItem('oceanarium-theme')
          var sys = window.matchMedia('(prefers-color-scheme: dark)').matches
          if (s === 'dark' || (!s && sys)) {
            document.documentElement.classList.add('dark')
          }
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
