name: Backend Deployment

on:
  push:
    # Trigger on pushes to the main and develop branches
    branches: [ "main", "develop" ]
    # Only runs when changes are made to the backend directory
    paths: [ "backend/**" ]


jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # Checkout the code from the repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Log in to Docker Hub using credentials stored in GitHub Secrets
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build the Docker image using the Dockerfile in the /backend folder
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          # Tag the image with the latest tag and push to Docker Hub
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/capstone-backend:latest

  deploy:
    # This job depends on the build-and-push job, and will only run if it finishes successfuly.
    needs: build-and-push
    # Only do the actual deployment if the push was to the main branch, not develop.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/capstone-backend:latest
            docker stop backend-app || true
            docker rm backend-app || true
            docker run -d \
              --name backend-app \
              --network="host" \
              --restart always \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              ${{ secrets.DOCKERHUB_USERNAME }}/capstone-backend:latest