name: Backend Deployment

on:
  push:
    # Trigger on pushes to the main and develop branches
    branches: [ "main", "develop", "feature/ci-cd-backend" ]
    # Only runs when changes are made to the backend directory
    #paths: [ "backend/**" ]


jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # Checkout the code from the repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Log in to Docker Hub using credentials stored in GitHub Secrets
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build the Docker image using the Dockerfile in the /backend folder
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          # Tag the image with the latest tag and push to Docker Hub
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/capstone-backend:latest

  deploy:
    needs: build-and-push
    # if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Get GitHub Runner IP
        id: ip
        run: echo "ipv4=$(curl -s https://api.ipify.org)" >> $GITHUB_OUTPUT

      - name: Open SSH in Security Group
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.AWS_SG_ID }} \
            --protocol tcp --port 22 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: "us-east-2"

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          # Use the SSH key stored in GitHub Secrets for authentication
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull the new image
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/capstone-backend:latest
            # Stop and clean up the old container
            docker stop backend-app || true
            docker rm backend-app || true
            # Run the new container
            # --network="host" ensures db.py finds Postgres at 127.0.0.1 [cite: 1, 2]
            # -e injects the DATABASE_URL required by db.py 
            docker run -d \
              --name backend-app \
              --network="host" \
              --restart always \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              ${{ secrets.DOCKERHUB_USERNAME }}/capstone-backend:latest

      - name: Close SSH in Security Group
        if: always() # This ensures the door is locked even if the deploy fails
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.AWS_SG_ID }} \
            --protocol tcp --port 22 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: "us-east-2"